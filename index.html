<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARCO STUDIOS - Visit Us</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* Define custom colors */
        :root {
            --color-bg-start: #171C26;
            --color-bg-end: #04080D;
            --color-text-light: #F2F2F2;
            --color-text-medium: #A1A2A6;
            --color-surface: #3A3B40;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg-start);
            background-image: linear-gradient(to bottom, var(--color-bg-start), var(--color-bg-end));
            color: var(--color-text-medium);
            margin: 0;
            overflow: hidden; /* Prevents scrollbars since it's just a single screen */
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0; /* Place it behind content */
        }

        /* Reveal Animation */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .text-gradient {
            background: linear-gradient(90deg, #F2F2F2, #A1A2A6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Floating Animation for Logo */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .floating-logo {
            animation: float 4s ease-in-out infinite;
            max-width: 250px;
            width: 100%;
            height: auto;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 15px rgba(242, 242, 242, 0.2));
            z-index: 20;
        }
    </style>
</head>
<body class="antialiased h-screen w-screen flex flex-col items-center justify-center">

    <!-- Interactive Background -->
    <canvas id="particle-canvas"></canvas>

    <!-- Main Content Area -->
    <main class="relative z-10 flex flex-col items-center text-center px-6">
        <!-- Floating Logo -->
        <img src="https://i.postimg.cc/0QBGqDT1/ms-logo.png" alt="Marco Studios Logo" class="floating-logo reveal">

        <h1 class="text-4xl md:text-6xl lg:text-7xl font-black uppercase tracking-widest reveal mb-10" style="transition-delay: 100ms;">
            <span class="text-gradient">Visit Us Here</span>
        </h1>
        
        <!-- Change the href to whatever link you want MARCO STUDIOS to go to -->
        <a href="https://marco-studios.vercel.app/" target="_blank" rel="noopener noreferrer" class="inline-block bg-[#F2F2F2] text-[#04080D] font-bold text-lg md:text-xl uppercase tracking-widest py-4 px-12 rounded-lg hover:bg-[#A1A2A6] transition-all duration-300 hover:scale-105 shadow-[0_0_20px_rgba(242,242,242,0.3)] hover:shadow-[0_0_30px_rgba(242,242,242,0.5)] reveal" style="transition-delay: 200ms;">
            MARCO STUDIOS
        </a>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 1. Reveal Elements on Load
            setTimeout(() => {
                const revealElements = document.querySelectorAll('.reveal');
                revealElements.forEach(el => el.classList.add('visible'));
            }, 100);

            // 2. Interactive Particle Background
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            let particlesArray;
            const mouse = { x: null, y: null, radius: (canvas.height / 120) * (canvas.width / 120) };
            
            window.addEventListener('mousemove', function(event) {
                mouse.x = event.x;
                mouse.y = event.y;
            });

            class Particle {
                constructor(x, y, directionX, directionY, size, color) {
                    this.x = x; this.y = y; this.directionX = directionX; this.directionY = directionY; this.size = size; this.color = color;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                    ctx.fillStyle = 'rgba(161, 162, 166, 0.3)';
                    ctx.fill();
                }
                update() {
                    if (this.x > canvas.width || this.x < 0) { this.directionX = -this.directionX; }
                    if (this.y > canvas.height || this.y < 0) { this.directionY = -this.directionY; }
                    this.x += this.directionX; this.y += this.directionY;
                    this.draw();
                }
            }

            function init() {
                particlesArray = [];
                let numberOfParticles = (canvas.height * canvas.width) / 9000;
                for (let i = 0; i < numberOfParticles; i++) {
                    let size = (Math.random() * 2) + 1;
                    let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                    let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                    let directionX = (Math.random() * .4) - 0.2;
                    let directionY = (Math.random() * .4) - 0.2;
                    let color = '#A1A2A6';
                    particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
                }
            }

            function connect() {
                let opacityValue = 1;
                for (let a = 0; a < particlesArray.length; a++) {
                    for (let b = a; b < particlesArray.length; b++) {
                        let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                        if (distance < (canvas.width / 7) * (canvas.height / 7)) {
                            opacityValue = 1 - (distance / 20000);
                            ctx.strokeStyle = 'rgba(161, 162, 166,' + opacityValue + ')';
                            ctx.lineWidth = 1;
                            ctx.beginPath();
                            ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                            ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                            ctx.stroke();
                        }
                    }
                }
            }

            function animate() {
                requestAnimationFrame(animate);
                ctx.clearRect(0, 0, innerWidth, innerHeight);
                for (let i = 0; i < particlesArray.length; i++) {
                    particlesArray[i].update();
                }
                connect();
            }

            window.addEventListener('resize', function() {
                canvas.width = innerWidth;
                canvas.height = innerHeight;
                mouse.radius = ((canvas.height / 120) * (canvas.height / 120));
                init();
            });

            window.addEventListener('mouseout', function(){
                mouse.x = undefined;
                mouse.y = undefined;
            });

            init();
            animate();
        });
    </script>
</body>
</html>
